<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCourts Cause List Scraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">eCourts Cause List Scraper</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form id="scrapeForm">
                    <div class="mb-3">
                        <label for="state" class="form-label">State *</label>
                        <select class="form-select" id="state" name="state" required>
                            <option value="">Select State</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="district" class="form-label">District *</label>
                        <select class="form-select" id="district" name="district" required disabled>
                            <option value="">Select District</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="complex" class="form-label">Court Complex *</label>
                        <select class="form-select" id="complex" name="complex" required disabled>
                            <option value="">Select Court Complex</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="court" class="form-label">Court Name *</label>
                        <select class="form-select" id="court" name="court" required disabled>
                            <option value="">Select Court Name</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="date" class="form-label">Cause List Date *</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="listType" class="form-label">List Type *</label>
                        <select class="form-select" id="listType" name="listType" required>
                            <option value="civil">Civil</option>
                            <option value="criminal">Criminal</option>
                        </select>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg">Generate Cause List PDF</button>
                    </div>
                </form>
                
                <div id="loading" class="text-center mt-4" style="display: none;">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Processing your request... This may take a few minutes.</p>
                </div>
                
                <div id="result" class="mt-4" style="display: none;">
                    <!-- Results will be displayed here -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
